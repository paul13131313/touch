<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>touch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;background:#050505}
  canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0}
  #title-screen{position:fixed;top:0;left:0;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;z-index:100;
    background:#050505;transition:opacity 1.8s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
  #title-screen.fade-out{opacity:0;pointer-events:none}
  #title-text{font-family:'Cormorant Garamond',serif;font-weight:300;
    font-size:14vw;color:#e8e4df;letter-spacing:0.18em;opacity:0;
    animation:reveal 2.5s cubic-bezier(0.4,0,0.2,1) 0.4s forwards}
  @keyframes reveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="title-screen"><div id="title-text">touch</div></div>
<canvas id="canvas"></canvas>
<script>
const TAU=Math.PI*2,PI=Math.PI;
let canvas,ctx,W,H,cx,cy,started=false,time=0;
let touching=false,touchX=0,touchY=0,prevTouchX=0,prevTouchY=0;
let pressure=0;
let matIdx=0;
let bg={r:5,g:5,b:5},bgT={r:5,g:5,b:5};
let audioCtx=null,bgmStarted=false;

// ── Rotation: very heavy, slow ──
let rotation=0, rotVel=0;
const ROT_DRIFT=0.0003;       // idle drift speed
const ROT_INPUT_SCALE=0.03;   // very weak finger input
const ROT_FRICTION=0.994;     // very slow decay
const ROT_BRAKE=0.92;         // finger-down braking

// ── 3D tilt ──
let tiltX=0,tiltY=0,tiltTX=0,tiltTY=0;
const TILT_EASE=0.04;
const TILT_MAX=0.2;
const SHADOW_DIST=12;

// ── Double-tap detection ──
let lastTapTime=0;
const DOUBLE_TAP_WINDOW=350;

const MATS=['jelly','stone','water','metal','cloud','sand','ice','ferrofluid','magma','plasma'];

let parts=[];
let blobs=[],grains=[],shards=[],spikes=[],lavaChunks=[],cloudPuffs=[],plasmaOrbs=[];

function bR(){return Math.min(W,H)*0.25}

function initMat(){
  parts=[];blobs=[];grains=[];shards=[];spikes=[];lavaChunks=[];
  cloudPuffs=[];plasmaOrbs=[];pressure=0;
  const R=bR(),m=MATS[matIdx];

  if(m==='jelly'){
    for(let i=0;i<60;i++){const a=(i/60)*TAU;
      blobs.push({x:Math.cos(a)*R,y:Math.sin(a)*R,vx:0,vy:0,
        tx:Math.cos(a)*R,ty:Math.sin(a)*R,a,bR:R})}}
  if(m==='stone'){
    for(let i=0;i<10;i++){const a=(i/10)*TAU+Math.random()*0.25;
      const r=R*(0.85+Math.random()*0.3);
      blobs.push({x:Math.cos(a)*r,y:Math.sin(a)*r,vx:0,vy:0,
        tx:Math.cos(a)*r,ty:Math.sin(a)*r,a,bR:r})}}
  if(m==='water'){
    blobs.push({x:0,y:0,vx:0,vy:0,r:R,tx:0,ty:0});
    for(let i=0;i<6;i++){const a=Math.random()*TAU,d=Math.random()*R*0.3;
      blobs.push({x:Math.cos(a)*d,y:Math.sin(a)*d,vx:0,vy:0,
        r:R*0.3+Math.random()*R*0.3,tx:Math.cos(a)*d,ty:Math.sin(a)*d})}}
  if(m==='metal'){
    for(let i=0;i<6;i++){const a=(i/6)*TAU;const r=R*1.05;
      blobs.push({x:Math.cos(a)*r,y:Math.sin(a)*r,vx:0,vy:0,
        tx:Math.cos(a)*r,ty:Math.sin(a)*r,a,bR:r})}}
  if(m==='cloud'){
    for(let i=0;i<40;i++){const a=Math.random()*TAU,d=Math.random()*R*0.8;
      cloudPuffs.push({x:Math.cos(a)*d,y:Math.sin(a)*d,
        vx:0,vy:0,r:20+Math.random()*50,a:0.15+Math.random()*0.15,
        ox:Math.cos(a)*d,oy:Math.sin(a)*d,phase:Math.random()*TAU,
        z:0.7+Math.random()*0.6})}}
  if(m==='sand'){
    for(let i=0;i<500;i++){const a=Math.random()*TAU,d=Math.random()*R;
      grains.push({x:Math.cos(a)*d,y:Math.sin(a)*d,vx:0,vy:0,
        r:1.2+Math.random()*2.5,col:Math.random()>0.5?[220,190,140]:[180,155,110],
        settled:true,z:0.8+Math.random()*0.4})}}
  if(m==='ice'){
    for(let i=0;i<22;i++){const a=Math.random()*TAU,d=Math.random()*R*0.9;
      shards.push({x:Math.cos(a)*d,y:Math.sin(a)*d,
        a:a+Math.random()*0.5,len:15+Math.random()*40,wid:3+Math.random()*10,
        vx:0,vy:0,alpha:0.4+Math.random()*0.4,z:0.6+Math.random()*0.8})}
    for(let i=0;i<200;i++){const a=Math.random()*TAU,d=Math.random()*R;
      grains.push({x:Math.cos(a)*d,y:Math.sin(a)*d,vx:0,vy:0,
        r:0.8+Math.random()*1.5,col:[200,230,255],settled:true,z:1})}}
  if(m==='ferrofluid'){
    for(let i=0;i<24;i++)spikes.push({a:(i/24)*TAU,len:0,targetLen:0,vel:0})}
  if(m==='magma'){
    for(let i=0;i<80;i++){const a=Math.random()*TAU,d=Math.random()*R;
      lavaChunks.push({x:Math.cos(a)*d,y:Math.sin(a)*d,vx:0,vy:0,
        r:4+Math.random()*12,heat:0.5+Math.random()*0.5,phase:Math.random()*TAU,
        z:0.7+Math.random()*0.6})}}
  if(m==='plasma'){
    for(let i=0;i<15;i++){const a=Math.random()*TAU,d=Math.random()*R*0.6;
      plasmaOrbs.push({x:Math.cos(a)*d,y:Math.sin(a)*d,
        vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8,
        r:10+Math.random()*25,hue:Math.random()*60+260,phase:Math.random()*TAU,
        z:0.6+Math.random()*0.8})}}

  const bgs={jelly:[12,5,15],stone:[14,12,10],water:[3,5,18],metal:[8,8,12],
    cloud:[12,12,14],sand:[16,14,10],ice:[4,8,16],ferrofluid:[2,2,5],
    magma:[14,4,2],plasma:[4,2,12]};
  const b=bgs[MATS[matIdx]];bgT={r:b[0],g:b[1],b:b[2]};
}

function toLocal(wx,wy){
  const dx=wx-cx,dy=wy-cy,c=Math.cos(-rotation),s=Math.sin(-rotation);
  return[dx*c-dy*s,dx*s+dy*c]}

// ── Audio ──
function startAudio(){
  if(bgmStarted)return;bgmStarted=true;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    const master=audioCtx.createGain();master.gain.value=0;
    master.gain.linearRampToValueAtTime(0.55,audioCtx.currentTime+4);

    function makeOsc(type,freq,vol){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(master);
      return{o,g}}

    const d1=makeOsc('sine',55,0.09);
    const d2=makeOsc('sine',82.41,0.05);
    const d3=makeOsc('triangle',110,0.025);
    const d4=makeOsc('sine',440,0.008);
    const d5=makeOsc('sine',36.7,0.06);

    const lfo=audioCtx.createOscillator(),lfoG=audioCtx.createGain();
    lfo.frequency.value=0.035;lfoG.gain.value=0.5;
    lfo.connect(lfoG);lfoG.connect(d1.o.frequency);lfoG.connect(d2.o.frequency);

    const lfo2=audioCtx.createOscillator(),lfo2G=audioCtx.createGain();
    lfo2.frequency.value=0.06;lfo2G.gain.value=0.006;
    lfo2.connect(lfo2G);lfo2G.connect(d4.g.gain);

    const delay=audioCtx.createDelay(2);delay.delayTime.value=0.9;
    const fb=audioCtx.createGain();fb.gain.value=0.28;
    const lpf=audioCtx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=500;
    delay.connect(lpf);lpf.connect(fb);fb.connect(delay);

    const delay2=audioCtx.createDelay(2);delay2.delayTime.value=1.4;
    const fb2=audioCtx.createGain();fb2.gain.value=0.18;
    const lpf2=audioCtx.createBiquadFilter();lpf2.type='lowpass';lpf2.frequency.value=350;
    delay2.connect(lpf2);lpf2.connect(fb2);fb2.connect(delay2);

    master.connect(audioCtx.destination);
    master.connect(delay);delay.connect(audioCtx.destination);
    master.connect(delay2);delay2.connect(audioCtx.destination);

    [d1,d2,d3,d4,d5].forEach(d=>d.o.start());lfo.start();lfo2.start();

    (function evolve(){if(!audioCtx)return;
      const t=audioCtx.currentTime,b=46+Math.sin(t*0.006)*6;
      d1.o.frequency.linearRampToValueAtTime(b,t+18);
      d2.o.frequency.linearRampToValueAtTime(b*1.498,t+22);
      d3.o.frequency.linearRampToValueAtTime(b*2.003,t+25);
      d5.o.frequency.linearRampToValueAtTime(b*0.667,t+28);
      d4.o.frequency.linearRampToValueAtTime(200+Math.sin(t*0.002)*50,t+25);
      setTimeout(evolve,15000)})();
  }catch(e){console.log('Audio:',e)}
}

// ── Init ──
function init(){
  canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');
  resize();window.addEventListener('resize',resize);
  const ts=document.getElementById('title-screen');
  const go=e=>{e.preventDefault();startApp()};
  ts.addEventListener('click',go);ts.addEventListener('touchend',go);
  canvas.addEventListener('touchstart',onTS,{passive:false});
  canvas.addEventListener('touchmove',onTM,{passive:false});
  canvas.addEventListener('touchend',onTE,{passive:false});
  canvas.addEventListener('touchcancel',onTE,{passive:false});
  canvas.addEventListener('mousedown',onMD);canvas.addEventListener('mousemove',onMM);
  canvas.addEventListener('mouseup',onMU);canvas.addEventListener('mouseleave',onMU);
  loop();
}
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);cx=W/2;cy=H/2;
}
function startApp(){
  if(started)return;started=true;startAudio();
  document.getElementById('title-screen').classList.add('fade-out');
  setTimeout(()=>document.getElementById('title-screen').style.display='none',1800);
  rotVel=ROT_DRIFT;
  initMat();
}
function setMat(idx){matIdx=idx;initMat();if(navigator.vibrate)navigator.vibrate([8])}
function nextMat(){setMat((matIdx+1)%MATS.length)}

// ── Touch ──
function onTS(e){e.preventDefault();if(!started)return;
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  const t=e.touches[0];touchX=t.clientX;touchY=t.clientY;
  prevTouchX=touchX;prevTouchY=touchY;
  touching=true;pressure=0;

  // Double-tap detection
  const now=Date.now();
  if(now-lastTapTime<DOUBLE_TAP_WINDOW){
    nextMat();lastTapTime=0;
  }else{
    lastTapTime=now;
  }
  if(navigator.vibrate)navigator.vibrate([3]);
}
function onTM(e){e.preventDefault();if(!started||!touching)return;
  const t=e.touches[0];prevTouchX=touchX;prevTouchY=touchY;
  touchX=t.clientX;touchY=t.clientY;
  // Very gentle rotation from finger drag
  const prevA=Math.atan2(prevTouchY-cy,prevTouchX-cx);
  const currA=Math.atan2(touchY-cy,touchX-cx);
  let da=currA-prevA;if(da>PI)da-=TAU;if(da<-PI)da+=TAU;
  rotVel+=da*ROT_INPUT_SCALE;
}
function onTE(e){e.preventDefault();if(!started)return;touching=false;pressure=0;
  tiltTX=0;tiltTY=0}

function onMD(e){if(!started)return;
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  touchX=e.clientX;touchY=e.clientY;prevTouchX=touchX;prevTouchY=touchY;
  touching=true;pressure=0;
  const now=Date.now();
  if(now-lastTapTime<DOUBLE_TAP_WINDOW){nextMat();lastTapTime=0}
  else lastTapTime=now;
}
function onMM(e){if(!started||!touching)return;
  prevTouchX=touchX;prevTouchY=touchY;touchX=e.clientX;touchY=e.clientY;
  const prevA=Math.atan2(prevTouchY-cy,prevTouchX-cx);
  const currA=Math.atan2(touchY-cy,touchX-cx);
  let da=currA-prevA;if(da>PI)da-=TAU;if(da<-PI)da+=TAU;
  rotVel+=da*ROT_INPUT_SCALE;
}
function onMU(){if(!started)return;touching=false;pressure=0;tiltTX=0;tiltTY=0}

// ── Global updates ──
function updateRotation(){
  if(touching){
    // Brake: pressing slows rotation, like a finger on a spinning disc
    rotVel*=ROT_BRAKE;
  }else{
    // Free spin with very slow friction
    rotVel*=ROT_FRICTION;
    // Gentle drift if nearly stopped
    if(Math.abs(rotVel)<ROT_DRIFT*0.5){
      rotVel+=(ROT_DRIFT-rotVel)*0.002;
    }
  }
  rotation+=rotVel;
}

function updateTilt(){
  if(touching){
    tiltTX=((touchX-cx)/W*2)*TILT_MAX;
    tiltTY=((touchY-cy)/H*2)*TILT_MAX;
  }
  tiltX+=(tiltTX-tiltX)*TILT_EASE;
  tiltY+=(tiltTY-tiltY)*TILT_EASE;
}

function updatePressure(){
  if(touching) pressure=Math.min(pressure+0.006,1); // slow buildup
}

// ── 3D helpers ──
function project3D(lx,ly,z){
  const perspective=800,zOff=(z-1)*40;
  const px=lx+tiltX*zOff*2,py=ly+tiltY*zOff*2;
  const scale=perspective/(perspective-zOff);
  return[px*scale,py*scale,scale]}
function shadowOffset(){return[-tiltX*SHADOW_DIST,-tiltY*SHADOW_DIST]}

function lerp(a,b,t){return a+(b-a)*t}
function drawBg(){
  bg.r=lerp(bg.r,bgT.r,0.02);bg.g=lerp(bg.g,bgT.g,0.02);bg.b=lerp(bg.b,bgT.b,0.02);
  ctx.fillStyle=`rgb(${bg.r|0},${bg.g|0},${bg.b|0})`;ctx.fillRect(0,0,W,H)}

function localTouch(){return toLocal(touchX,touchY)}

function drawShadow(drawFn,alpha){
  const[sx,sy]=shadowOffset();
  ctx.save();ctx.translate(cx+sx*2,cy+sy*2);ctx.rotate(rotation);
  ctx.globalAlpha=alpha||0.07;ctx.filter='blur(14px)';
  drawFn(true);ctx.filter='none';ctx.globalAlpha=1;ctx.restore()}

// Touch glow - very subtle
function drawTouchGlow(r,g,b){
  if(!touching)return;
  const rad=12+pressure*12;
  const tg=ctx.createRadialGradient(touchX,touchY,0,touchX,touchY,rad);
  tg.addColorStop(0,`rgba(${r},${g},${b},${0.06+pressure*0.1})`);
  tg.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.fillStyle=tg;ctx.beginPath();ctx.arc(touchX,touchY,rad,0,TAU);ctx.fill();
}

// ════════════════════════════════════════════════════════════
//  MATERIALS - subtle, sensitive
// ════════════════════════════════════════════════════════════

// ── JELLY ──
function updateJelly(){
  const R=bR(),[ltx,lty]=localTouch();
  for(const b of blobs){
    const w=Math.sin(time*0.012+b.a*3)*4+Math.sin(time*0.02+b.a*7)*2.5;
    let tx=b.tx+Math.cos(b.a)*w,ty=b.ty+Math.sin(b.a)*w;
    if(touching){
      const dx=b.x-ltx,dy=b.y-lty,d=Math.hypot(dx,dy);
      const inf=Math.max(0,1-d/(R*1.6));
      if(inf>0){const p=inf*0.25*R*pressure,a=Math.atan2(dy,dx);
        b.vx+=Math.cos(a)*p*0.02;b.vy+=Math.sin(a)*p*0.02}}
    b.vx=(b.vx+(tx-b.x)*0.012)*0.88;b.vy=(b.vy+(ty-b.y)*0.012)*0.88;
    b.x+=b.vx;b.y+=b.vy}
}
function drawJellyShape(isShadow){
  const R=bR();
  ctx.beginPath();
  const L=blobs[blobs.length-1],F=blobs[0];
  ctx.moveTo((L.x+F.x)/2,(L.y+F.y)/2);
  for(let i=0;i<blobs.length;i++){const c=blobs[i],n=blobs[(i+1)%blobs.length];
    ctx.quadraticCurveTo(c.x,c.y,(c.x+n.x)/2,(c.y+n.y)/2)}
  ctx.closePath();
  if(isShadow){ctx.fillStyle='rgba(0,0,0,1)';ctx.fill();return}
  const fg=ctx.createRadialGradient(-R*0.3,-R*0.4,0,0,0,R*1.3);
  fg.addColorStop(0,'rgba(255,160,200,1)');fg.addColorStop(0.5,'rgba(230,120,210,1)');
  fg.addColorStop(1,'rgba(180,80,190,1)');
  ctx.fillStyle=fg;ctx.fill();
  ctx.save();ctx.clip();
  const hg=ctx.createRadialGradient(-R*0.25+tiltX*25,-R*0.35+tiltY*25,0,0,0,R*0.9);
  hg.addColorStop(0,'rgba(255,255,255,0.3)');hg.addColorStop(0.4,'rgba(255,255,255,0.06)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;ctx.fillRect(-R*2,-R*2,R*4,R*4);ctx.restore();
}
function drawJelly(){
  const R=bR();
  const ag=ctx.createRadialGradient(cx,cy,R*0.2,cx,cy,R*2);
  ag.addColorStop(0,'rgba(255,140,200,0.04)');ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);
  drawShadow(drawJellyShape,0.06);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  drawJellyShape(false);ctx.restore();
  drawTouchGlow(255,180,220);
}

// ── STONE ──
function updateStone(){
  const[ltx,lty]=localTouch();
  if(touching&&pressure>0.4&&Math.random()<0.04*pressure){const a=Math.random()*TAU;
    parts.push({x:ltx+(Math.random()-0.5)*10,y:lty+(Math.random()-0.5)*10,
      vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5-1,r:1+Math.random()*3,life:1,decay:0.006,
      col:[140+Math.random()*30|0,120+Math.random()*30|0,100+Math.random()*20|0]});
    if(navigator.vibrate)navigator.vibrate([2])}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.vx*=0.99;p.life-=p.decay;
    if(p.life<=0)parts.splice(i,1)}
}
function drawStoneShape(isShadow){
  ctx.beginPath();ctx.moveTo(blobs[0].x,blobs[0].y);
  for(let i=1;i<blobs.length;i++)ctx.lineTo(blobs[i].x,blobs[i].y);
  ctx.closePath();
  if(isShadow){ctx.fillStyle='rgba(0,0,0,1)';ctx.fill();return}
  const R=bR();
  const fg=ctx.createRadialGradient(-R*0.2,-R*0.3,0,0,0,R*1.2);
  fg.addColorStop(0,'rgb(160,145,125)');fg.addColorStop(0.6,'rgb(130,115,95)');fg.addColorStop(1,'rgb(90,80,65)');
  ctx.fillStyle=fg;ctx.fill();
  ctx.save();ctx.clip();
  for(let i=0;i<500;i++){const rx=(Math.random()-0.5)*R*2.5,ry=(Math.random()-0.5)*R*2.5;
    ctx.beginPath();ctx.arc(rx,ry,0.3+Math.random()*1.8,0,TAU);
    ctx.fillStyle=Math.random()>0.5?`rgba(0,0,0,${0.05+Math.random()*0.12})`:`rgba(255,255,255,${0.02+Math.random()*0.04})`;ctx.fill()}
  const hg=ctx.createRadialGradient(-R*0.2+tiltX*30,-R*0.25+tiltY*30,0,0,0,R*0.8);
  hg.addColorStop(0,'rgba(255,255,255,0.05)');hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;ctx.fillRect(-R*2,-R*2,R*4,R*4);ctx.restore();
}
function drawStone(){
  drawShadow(drawStoneShape,0.09);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  drawStoneShape(false);
  for(const p of parts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.life})`;ctx.fill()}
  ctx.restore();
  if(touching&&pressure>0.3){
    const dg=ctx.createRadialGradient(touchX,touchY,0,touchX,touchY,25*pressure);
    dg.addColorStop(0,`rgba(160,140,110,${pressure*0.06})`);dg.addColorStop(1,'rgba(160,140,110,0)');
    ctx.fillStyle=dg;ctx.beginPath();ctx.arc(touchX,touchY,25*pressure,0,TAU);ctx.fill()}
}

// ── WATER ──
function updateWater(){
  const R=bR(),[ltx,lty]=localTouch();
  if(touching){
    if(Math.random()<0.08*pressure){const a=Math.random()*TAU,sp=1+Math.random()*3*pressure;
      parts.push({x:ltx,y:lty,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5*pressure,
        r:1.5+Math.random()*6,life:1,decay:0.005+Math.random()*0.006,
        col:[40+Math.random()*40|0,120+Math.random()*60|0,220+Math.random()*35|0],z:Math.random()>0.5?1.3:0.7})}
    for(const b of blobs){const dx=b.x-ltx,dy=b.y-lty,d=Math.hypot(dx,dy);
      if(d<R*1.8){const f=Math.max(0,1-d/(R*1.8))*pressure*3;
        b.vx+=dx/Math.max(d,1)*f;b.vy+=dy/Math.max(d,1)*f}}}
  for(const b of blobs){b.vx=(b.vx+(b.tx-b.x)*0.003)*0.95;
    b.vy=(b.vy+(b.ty-b.y)*0.003)*0.95;b.x+=b.vx;b.y+=b.vy}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.99;p.r*=0.999;
    p.life-=p.decay;if(p.life<=0)parts.splice(i,1)}
}
function drawWater(){
  const R=bR();
  const ag=ctx.createRadialGradient(cx,cy,R*0.2,cx,cy,R*2.5);
  ag.addColorStop(0,'rgba(40,100,255,0.04)');ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);
  const[sx,sy]=shadowOffset();
  ctx.save();ctx.translate(cx+sx*2,cy+sy*2);ctx.rotate(rotation);
  ctx.globalAlpha=0.05;ctx.filter='blur(16px)';
  for(const b of blobs){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.fillStyle='#000';ctx.fill()}
  ctx.filter='none';ctx.globalAlpha=1;ctx.restore();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  for(const b of blobs){
    const g=ctx.createRadialGradient(b.x-b.r*0.2+tiltX*12,b.y-b.r*0.2+tiltY*12,0,b.x,b.y,b.r);
    g.addColorStop(0,'rgba(80,160,255,0.45)');g.addColorStop(0.5,'rgba(30,80,200,0.35)');g.addColorStop(1,'rgba(20,50,150,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.fill();
    const hg=ctx.createRadialGradient(b.x-b.r*0.3+tiltX*18,b.y-b.r*0.35+tiltY*18,0,b.x,b.y,b.r*0.7);
    hg.addColorStop(0,'rgba(200,230,255,0.2)');hg.addColorStop(1,'rgba(200,230,255,0)');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.7,0,TAU);ctx.fill()}
  for(const p of parts){const[px,py,sc]=project3D(p.x,p.y,p.z||1);const r=p.r*sc;
    const g=ctx.createRadialGradient(px-r*0.2,py-r*0.2,0,px,py,r);
    g.addColorStop(0,`rgba(${Math.min(255,p.col[0]+60)},${Math.min(255,p.col[1]+60)},${Math.min(255,p.col[2]+30)},${p.life*0.7})`);
    g.addColorStop(1,`rgba(${p.col[0]},${p.col[1]},${p.col[2]},0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,r,0,TAU);ctx.fill()}
  ctx.restore();
}

// ── METAL ──
function updateMetal(){
  const[ltx,lty]=localTouch();
  if(touching){
    if(navigator.vibrate&&time%15===0&&pressure>0.3)navigator.vibrate([1]);
    if(Math.random()<0.08*pressure&&pressure>0.3){const a=Math.random()*TAU;
      parts.push({x:ltx,y:lty,vx:Math.cos(a)*2,vy:Math.sin(a)*2-1.5,
        r:0.4+Math.random()*1,life:1,decay:0.03,col:[255,240,200]})}}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life-=p.decay;if(p.life<=0)parts.splice(i,1)}
}
function drawMetalShape(isShadow){
  ctx.beginPath();ctx.moveTo(blobs[0].x,blobs[0].y);
  for(let i=1;i<blobs.length;i++)ctx.lineTo(blobs[i].x,blobs[i].y);
  ctx.closePath();
  if(isShadow){ctx.fillStyle='rgba(0,0,0,1)';ctx.fill();return}
  const R=bR(),angle=Math.atan2(tiltY,tiltX);
  const fg=ctx.createLinearGradient(Math.cos(angle)*-R,Math.sin(angle)*-R,Math.cos(angle)*R,Math.sin(angle)*R);
  fg.addColorStop(0,'rgb(210,215,225)');fg.addColorStop(0.25,'rgb(155,160,175)');
  fg.addColorStop(0.5,'rgb(225,228,238)');fg.addColorStop(0.75,'rgb(145,150,165)');fg.addColorStop(1,'rgb(195,200,215)');
  ctx.fillStyle=fg;ctx.fill();
  ctx.save();ctx.clip();
  const rg=ctx.createRadialGradient(-R*0.2+tiltX*40,-R*0.3+tiltY*40,0,0,0,R*0.9);
  rg.addColorStop(0,'rgba(255,255,255,0.22)');rg.addColorStop(0.4,'rgba(255,255,255,0)');
  ctx.fillStyle=rg;ctx.fillRect(-R*2,-R*2,R*4,R*4);ctx.restore();
  ctx.strokeStyle='rgba(180,185,200,0.25)';ctx.lineWidth=1.5;ctx.stroke();
}
function drawMetal(){
  drawShadow(drawMetalShape,0.1);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  drawMetalShape(false);
  for(const p of parts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.life})`;ctx.fill()}
  ctx.restore();
}

// ── CLOUD ──
function updateCloud(){
  const[ltx,lty]=localTouch();
  if(touching){
    for(const p of cloudPuffs){const dx=p.x-ltx,dy=p.y-lty,d=Math.hypot(dx,dy);
      if(d<120){const f=Math.max(0,1-d/120)*pressure*1.5;
        p.vx+=dx/Math.max(d,1)*f;p.vy+=dy/Math.max(d,1)*f}}}
  for(const p of cloudPuffs){
    const tx=p.ox+Math.sin(time*0.005+p.phase)*12;
    const ty=p.oy+Math.cos(time*0.007+p.phase)*8;
    p.vx=(p.vx+(tx-p.x)*0.003)*0.96;p.vy=(p.vy+(ty-p.y)*0.003)*0.96;
    p.x+=p.vx;p.y+=p.vy}
}
function drawCloud(){
  const sorted=[...cloudPuffs].sort((a,b)=>a.z-b.z);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  for(const p of sorted){const[px,py,sc]=project3D(p.x,p.y,p.z);const r=p.r*sc;
    const g=ctx.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,`rgba(240,235,228,${p.a*sc*0.6})`);
    g.addColorStop(0.5,`rgba(240,235,228,${p.a*0.25*sc})`);
    g.addColorStop(1,'rgba(240,235,228,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,r,0,TAU);ctx.fill()}
  ctx.restore();
}

// ── SAND ──
function updateSand(){
  const[ltx,lty]=localTouch();
  if(touching){
    if(navigator.vibrate&&time%6===0&&pressure>0.2)navigator.vibrate([1]);
    for(const g of grains){const dx=g.x-ltx,dy=g.y-lty,d=Math.hypot(dx,dy);
      if(d<50+30*pressure){const f=(1-d/(50+30*pressure))*pressure*2;
        g.vx+=dx/Math.max(d,1)*f+(Math.random()-0.5);
        g.vy+=dy/Math.max(d,1)*f+(Math.random()-0.5);
        g.settled=false}}}
  for(const g of grains){if(!g.settled){
    g.vy+=0.1;g.vx*=0.97;g.vy*=0.97;g.x+=g.vx;g.y+=g.vy;
    const R=bR();if(Math.hypot(g.x,g.y)>R*3){g.vx*=-0.3;g.vy*=-0.3}
    if(Math.abs(g.vx)<0.08&&Math.abs(g.vy)<0.2)g.settled=true}}
}
function drawSand(){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  const sorted=[...grains].sort((a,b)=>(a.z||1)-(b.z||1));
  for(const g of sorted){const[px,py,sc]=project3D(g.x,g.y,g.z||1);
    ctx.beginPath();ctx.arc(px,py,g.r*sc,0,TAU);
    const bright=0.7+0.3*(g.z||1);
    ctx.fillStyle=`rgb(${g.col[0]*bright|0},${g.col[1]*bright|0},${g.col[2]*bright|0})`;ctx.fill()}
  ctx.restore();
}

// ── ICE ──
function updateIce(){
  const R=bR(),[ltx,lty]=localTouch();
  if(touching){
    if(pressure>0.5&&Math.random()<0.03*pressure){const idx=Math.random()*shards.length|0;
      if(shards[idx]){const s=shards[idx];s.vx=(s.x-ltx)*0.03;s.vy=(s.y-lty)*0.03-0.8}}
    for(const g of grains){const d=Math.hypot(g.x-ltx,g.y-lty);
      if(d<50*pressure){g.vx+=(g.x-ltx)/Math.max(d,1)*pressure;
        g.vy+=(g.y-lty)/Math.max(d,1)*pressure;g.settled=false}}}
  for(const s of shards){s.x+=s.vx;s.y+=s.vy;s.vy+=0.02;s.vx*=0.995;s.vy*=0.995}
  for(const g of grains){if(!g.settled){g.x+=g.vx;g.y+=g.vy;g.vy+=0.01;g.vx*=0.995;g.vy*=0.995}}
}
function drawIce(){
  const R=bR();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  const ig=ctx.createRadialGradient(0,0,0,0,0,R);
  ig.addColorStop(0,'rgba(180,220,255,0.1)');ig.addColorStop(0.7,'rgba(140,200,250,0.05)');ig.addColorStop(1,'rgba(100,180,240,0)');
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(0,0,R,0,TAU);ctx.fill();
  const sortedS=[...shards].sort((a,b)=>(a.z||1)-(b.z||1));
  for(const s of sortedS){const[px,py,sc]=project3D(s.x,s.y,s.z||1);
    ctx.save();ctx.translate(px,py);ctx.rotate(s.a);ctx.scale(sc,sc);
    ctx.beginPath();ctx.moveTo(0,-s.len/2);ctx.lineTo(s.wid/2,0);ctx.lineTo(0,s.len/2);ctx.lineTo(-s.wid/2,0);ctx.closePath();
    const sg=ctx.createLinearGradient(0,-s.len/2,0,s.len/2);
    const tb=0.8+tiltX*0.2;
    sg.addColorStop(0,`rgba(${200*tb|0},235,255,${s.alpha})`);
    sg.addColorStop(0.5,`rgba(160,210,250,${s.alpha*0.6})`);
    sg.addColorStop(1,`rgba(120,190,240,${s.alpha*0.3})`);
    ctx.fillStyle=sg;ctx.fill();ctx.strokeStyle=`rgba(220,240,255,${s.alpha*0.3})`;ctx.lineWidth=0.5;ctx.stroke();
    ctx.restore()}
  for(const g of grains){ctx.beginPath();ctx.arc(g.x,g.y,g.r,0,TAU);
    ctx.fillStyle=`rgba(${g.col[0]},${g.col[1]},${g.col[2]},0.5)`;ctx.fill()}
  ctx.restore();
}

// ── FERROFLUID ──
function updateFerrofluid(){
  const R=bR(),[ltx,lty]=localTouch();
  for(const s of spikes){
    let target=R*0.3+Math.sin(time*0.012+s.a*3)*4;
    if(touching){
      const angleDist=Math.abs(((s.a-Math.atan2(lty,ltx)+PI)%TAU)-PI);
      const dist=Math.hypot(ltx,lty);
      const closeness=Math.max(0,1-dist/(R*2));
      if(angleDist<0.6)target=R*0.4+R*0.5*(1-angleDist/0.6)*(0.3+closeness*0.3+pressure*0.4);
      else target=R*0.15}
    s.vel+=(target-s.len)*0.05;s.vel*=0.88;s.len+=s.vel;s.len=Math.max(0,s.len)}
}
function drawFerrofluid(){
  const R=bR();
  const[sx,sy]=shadowOffset();
  ctx.save();ctx.translate(cx+sx*2,cy+sy*2);ctx.rotate(rotation);
  ctx.globalAlpha=0.06;ctx.filter='blur(14px)';
  ctx.beginPath();ctx.arc(0,0,R*0.5,0,TAU);ctx.fillStyle='#000';ctx.fill();
  ctx.filter='none';ctx.globalAlpha=1;ctx.restore();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  const bg2=ctx.createRadialGradient(tiltX*8,tiltY*8,0,0,0,R*0.5);
  bg2.addColorStop(0,'rgba(18,12,35,0.95)');bg2.addColorStop(1,'rgba(10,5,20,0.6)');
  ctx.fillStyle=bg2;ctx.beginPath();ctx.arc(0,0,R*0.5,0,TAU);ctx.fill();
  for(const s of spikes){
    const bx=Math.cos(s.a)*R*0.3,by=Math.sin(s.a)*R*0.3;
    const ex=Math.cos(s.a)*(R*0.3+s.len),ey=Math.sin(s.a)*(R*0.3+s.len);
    const px=Math.cos(s.a+PI/2)*5,py=Math.sin(s.a+PI/2)*5;
    ctx.beginPath();ctx.moveTo(bx+px,by+py);ctx.lineTo(ex,ey);ctx.lineTo(bx-px,by-py);ctx.closePath();
    const sg=ctx.createLinearGradient(bx,by,ex,ey);
    sg.addColorStop(0,'rgba(20,15,40,0.9)');sg.addColorStop(0.7,'rgba(40,20,80,0.7)');sg.addColorStop(1,'rgba(80,40,140,0.25)');
    ctx.fillStyle=sg;ctx.fill();
    ctx.beginPath();ctx.arc(ex,ey,1.5+s.len*0.006,0,TAU);
    ctx.fillStyle='rgba(120,60,200,0.3)';ctx.fill()}
  const ig=ctx.createRadialGradient(-R*0.1+tiltX*20,-R*0.15+tiltY*20,0,0,0,R*0.5);
  ig.addColorStop(0,'rgba(100,80,200,0.1)');ig.addColorStop(0.5,'rgba(60,120,180,0.03)');ig.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(0,0,R*0.5,0,TAU);ctx.fill();
  ctx.restore();
}

// ── MAGMA ──
function updateMagma(){
  const R=bR(),[ltx,lty]=localTouch();
  if(touching){
    for(const c of lavaChunks){const dx=c.x-ltx,dy=c.y-lty,d=Math.hypot(dx,dy);
      if(d<R){c.heat=Math.min(1,c.heat+0.008*pressure);
        const f=Math.max(0,1-d/R)*pressure*2;
        c.vx+=dx/Math.max(d,1)*f;c.vy+=dy/Math.max(d,1)*f-pressure*0.15}}}
  for(const c of lavaChunks){
    const tx=Math.cos(c.phase+time*0.002)*R*0.5,ty=Math.sin(c.phase+time*0.003)*R*0.5;
    c.vx=(c.vx+(tx-c.x)*0.002)*0.97;c.vy=(c.vy+(ty-c.y)*0.002)*0.97;
    c.x+=c.vx;c.y+=c.vy;c.heat=Math.max(0.3,c.heat-0.0008);
    if(c.heat>0.75&&Math.random()<0.02){
      parts.push({x:c.x,y:c.y,vx:(Math.random()-0.5),vy:-0.5-Math.random()*1.5,
        r:0.8+Math.random()*1.5,life:1,decay:0.012,col:[255,200+Math.random()*55|0,50],z:1+Math.random()*0.5})}}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy-=0.008;if(p.z)p.z+=0.003;
    p.life-=p.decay;if(p.life<=0)parts.splice(i,1)}
}
function drawMagma(){
  const R=bR();
  const lg=ctx.createRadialGradient(cx,cy,R*0.3,cx,cy,R*2);
  lg.addColorStop(0,'rgba(255,80,20,0.05)');lg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  const[sx,sy]=shadowOffset();
  ctx.save();ctx.translate(cx+sx,cy+sy+6);ctx.rotate(rotation);
  ctx.globalAlpha=0.04;ctx.filter='blur(18px)';
  for(const c of lavaChunks){ctx.beginPath();ctx.arc(c.x,c.y,c.r*1.5,0,TAU);
    ctx.fillStyle=`rgb(${80+c.heat*80|0},${c.heat*30|0},0)`;ctx.fill()}
  ctx.filter='none';ctx.globalAlpha=1;ctx.restore();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  const sorted=[...lavaChunks].sort((a,b)=>(a.z||1)-(b.z||1));
  for(const c of sorted){const h=c.heat;
    const[px,py,sc]=project3D(c.x,c.y,c.z||1);
    const r1=Math.min(255,100+h*155)|0,g1=Math.min(255,20+h*180)|0,b1=Math.min(255,h*30)|0;
    const g=ctx.createRadialGradient(px,py,0,px,py,c.r*sc*(1+h*0.3));
    g.addColorStop(0,`rgba(${r1},${g1},${b1},0.85)`);
    g.addColorStop(0.6,`rgba(${r1*0.6|0},${g1*0.3|0},0,0.5)`);g.addColorStop(1,'rgba(40,10,5,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,c.r*sc*(1+h*0.3),0,TAU);ctx.fill();
    if(h>0.65){ctx.beginPath();ctx.arc(px,py,c.r*sc*0.35,0,TAU);
      ctx.fillStyle=`rgba(255,${200+h*55|0},100,${(h-0.65)*0.35})`;ctx.fill()}}
  for(const p of parts){const[px,py,sc]=project3D(p.x,p.y,p.z||1);
    ctx.beginPath();ctx.arc(px,py,p.r*sc,0,TAU);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.life})`;ctx.fill()}
  ctx.restore();
}

// ── PLASMA ──
function updatePlasma(){
  const R=bR(),[ltx,lty]=localTouch();
  if(touching){
    for(const o of plasmaOrbs){const dx=o.x-ltx,dy=o.y-lty,d=Math.hypot(dx,dy);
      if(d<R*1.5){const f=Math.max(0,1-d/(R*1.5))*pressure*3;
        o.vx+=dx/Math.max(d,1)*f;o.vy+=dy/Math.max(d,1)*f}}}
  for(const o of plasmaOrbs){
    const a=Math.atan2(o.y,o.x);
    o.vx+=Math.cos(a+PI/2)*0.06;o.vy+=Math.sin(a+PI/2)*0.06;
    o.vx+=-o.x*0.001;o.vy+=-o.y*0.001;
    o.vx*=0.99;o.vy*=0.99;o.x+=o.vx;o.y+=o.vy;o.hue+=0.15;
    if(Math.random()<0.15)parts.push({x:o.x,y:o.y,
      vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
      r:o.r*0.25+Math.random()*3,life:1,decay:0.015,hue:o.hue,z:o.z||1})}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.r*=0.99;p.life-=p.decay;
    if(p.life<=0)parts.splice(i,1)}
}
function drawPlasma(){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  for(const p of parts){if(p.hue===undefined)continue;
    const[px,py,sc]=project3D(p.x,p.y,p.z||1);
    ctx.beginPath();ctx.arc(px,py,p.r*sc,0,TAU);
    ctx.fillStyle=`hsla(${p.hue%360},80%,60%,${p.life*0.08})`;ctx.fill()}
  const sorted=[...plasmaOrbs].sort((a,b)=>(a.z||1)-(b.z||1));
  for(const o of sorted){const h=o.hue%360;
    const[px,py,sc]=project3D(o.x,o.y,o.z||1);const r=o.r*sc;
    const g=ctx.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,`hsla(${h},90%,80%,0.5)`);g.addColorStop(0.3,`hsla(${h},80%,50%,0.25)`);
    g.addColorStop(1,`hsla(${h},70%,30%,0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,r,0,TAU);ctx.fill();
    ctx.beginPath();ctx.arc(px,py,r*0.18,0,TAU);
    ctx.fillStyle=`hsla(${h},100%,90%,0.7)`;ctx.fill();
    for(const o2 of plasmaOrbs){if(o===o2)continue;
      const d=Math.hypot(o.x-o2.x,o.y-o2.y);
      if(d<100&&Math.random()<0.04){
        const[p2x,p2y]=project3D(o2.x,o2.y,o2.z||1);
        ctx.beginPath();ctx.moveTo(px,py);
        ctx.quadraticCurveTo((px+p2x)/2+(Math.random()-0.5)*20,(py+p2y)/2+(Math.random()-0.5)*20,p2x,p2y);
        ctx.strokeStyle=`hsla(${h},90%,70%,0.18)`;ctx.lineWidth=0.6;ctx.stroke()}}}
  ctx.restore();
}

// ════════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════════
function loop(){
  time++;drawBg();
  if(started){
    updateRotation();
    updateTilt();
    updatePressure();
    const m=MATS[matIdx];
    switch(m){
      case'jelly':updateJelly();drawJelly();break;
      case'stone':updateStone();drawStone();break;
      case'water':updateWater();drawWater();break;
      case'metal':updateMetal();drawMetal();break;
      case'cloud':updateCloud();drawCloud();break;
      case'sand':updateSand();drawSand();break;
      case'ice':updateIce();drawIce();break;
      case'ferrofluid':updateFerrofluid();drawFerrofluid();break;
      case'magma':updateMagma();drawMagma();break;
      case'plasma':updatePlasma();drawPlasma();break;}}
  requestAnimationFrame(loop)}

window.addEventListener('DOMContentLoaded',init);
